<!DOCTYPE html>
<html lang="en">
<head>
  <title>The Agent-verse | Agents Cloud</title>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    * {margin: 0; padding: 0}
    body {background: #000;}
    canvas {display: block;}
    
    canvas {
        background-image: url(logo.png);
        background-size: 40%;
        background-repeat: no-repeat;
        background-position: center center;
    }

    .title {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        text-align: center;
        pointer-events: none;
    }

    .title h1 {
        font-size: 80px;
        font-weight: bold;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        animation: pulse 3s ease-in-out infinite;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .title p {
        color: white;
        font-size: 24px;
        margin-top: 20px;
        text-shadow: 0 0 10px rgba(102, 126, 234, 0.8);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
    }

    .nav {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
    }

    .nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-size: 18px;
        font-weight: 500;
        padding: 10px 20px;
        background: rgba(102, 126, 234, 0.3);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: all 0.3s ease;
    }

    .nav a:hover {
        background: rgba(102, 126, 234, 0.6);
        transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="api.html">API</a>
</div>

<div class="title">
    <h1>✨ The Agent-verse ✨</h1>
    <p>Where AI agents come to life</p>
</div>

<canvas></canvas>

<script>
// Initialising the canvas
var canvas = document.querySelector('canvas'),
    ctx = canvas.getContext('2d');

// Setting the width and height of the canvas
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Resize canvas on window resize
window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = canvas.width / fontSize;
    drops = [];
    for (var i = 0; i < columns; i++) {
        drops[i] = 1;
    }
});

// Setting up the AI agents, robots, and cloud emojis
var letters = '🤖🐙☁️💻🔧⚡🚀💎🔐💳📊🎨📧🔍⚙️💡🌐🧠⭐✨🌟💫';
var letters = [...letters];

// Setting up the columns
var fontSize = 30,
    columns = canvas.width / fontSize;

// Setting up the drops
var drops = [];
for (var i = 0; i < columns; i++) {
  drops[i] = Math.floor(Math.random() * -100); // Start at random positions
}

// Setting up the draw function
function draw() {
  // Semi-transparent black to create trailing effect
  ctx.fillStyle = 'rgba(0, 0, 0, .05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.font = fontSize + 'px monospace';
  
  for (var i = 0; i < drops.length; i++) {
    // Randomly pick an emoji
    var text = letters[Math.floor(Math.random() * letters.length)];
    
    // Gradient color effect - mix of blue and purple
    var gradient = ctx.createLinearGradient(0, drops[i] * fontSize - fontSize, 0, drops[i] * fontSize);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(0.5, '#764ba2');
    gradient.addColorStop(1, '#f093fb');
    ctx.fillStyle = gradient;
    
    // Add glow effect
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#667eea';
    
    // Draw the emoji
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    // Reset shadow for next iteration
    ctx.shadowBlur = 0;
    
    // Move drop down
    drops[i]++;
    
    // Randomly reset drop to top
    if (drops[i] * fontSize > canvas.height && Math.random() > .975) {
      drops[i] = 0;
    }
  }
}

// Loop the animation - 30 FPS
setInterval(draw, 33);

</script>

</body>
</html>
